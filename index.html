<style>
/* DISEÑO MINIMALISTA SAMARA */
:root {
  --bg: #ffffff;
  --surface: #fafafa;
  --text-main: #111111;
  --text-muted: #666666;
  --border: #eaeaea;
  --accent: #000000;
  --accent-hover: #333333;
  --danger: #d93025;
  --success: #1e8e3e;
  --radius: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; }
body { background: var(--bg); color: var(--text-main); min-height: 100vh; -webkit-tap-highlight-color: transparent; }

/* UTILIDADES Y BOTONES */
.btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-main); padding: 8px 16px; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { background: var(--border); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-hover); }
.btn-danger { color: var(--danger); border-color: var(--border); }
.btn-danger:hover { background: #fff5f5; border-color: var(--danger); }
.input-box { width: 100%; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; font-size: 14px; outline: none; background: var(--bg); color: var(--text-main); transition: border 0.2s; }
.input-box:focus { border-color: var(--accent); }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; border: 1px solid var(--border); }

/* LOGIN */
#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: var(--surface); }
.login-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 100%; max-width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
.login-logo { font-size: 24px; font-weight: 700; text-align: center; letter-spacing: -0.5px; margin-bottom: 8px; }
